short_bio_text_justify: true
short_bio: >-
  <p>
    I am currently a PhD student in Computer Science at the <a href="https://www.cst.cam.ac.uk/" target="_blank">Cambridge Computer Laboratory</a>, supervised by <a href="https://www.cl.cam.ac.uk/~mj201/index.html" target="_blank">Prof. Mateja Jamnik</a>. My research is generously supported by the <a href="https://research.google/programs-and-events/phd-fellowship/recipients/" target="_blank">Google PhD Fellowship</a>.
    My research interest primarily lies at the intersection of structured tabular data and explainable artificial intelligence (XAI). In particular, my work focuses on:
  </p>
  <ul>
    <li>foundation models for structured data</li>
    <li>generative modelling for tabular data</li>
    <li>trustworthy AI solutions for scientific applications</li>
  </ul>
  <p>
    Before joining Cambridge, I was fortunate to work as a research intern on embodied AI at <a href="https://mtlab.meitu.com/en/?lang=en" target="_blank">MT Lab</a> and <a href="https://colalab.net/" target="_blank">Cola Laboratory</a> under the supervision of <a href="https://sites.google.com/site/siliuhome/" target="_blank">Prof. Si Liu</a>.
  </p>
  <p>
    If you would like to discuss anything related to XAI, structured tabular data, or any other interesting topics, please feel free to reach out via: <code>silencejiang12138 [at] gmail [dot] com</code>.
  </p>
